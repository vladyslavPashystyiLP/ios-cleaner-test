name: iOS Simulator build (Appetize)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      # Two separate single-arch bundles instead of one universal binary:
      # the universal (lipo) packaging crashed on launch, and single-RID builds
      # are the well-trodden path. arm64 runs natively on Appetize's Apple Silicon
      # hosts (required for CoreML/Vision); x64 is the Rosetta fallback.
      - name: Build iOS simulator app (arm64)
        run: dotnet build IosCleanerTest/IosCleanerTest.csproj -f net9.0-ios -c Debug -p:RuntimeIdentifier=iossimulator-arm64

      - name: Build iOS simulator app (x64)
        run: dotnet build IosCleanerTest/IosCleanerTest.csproj -f net9.0-ios -c Debug -p:RuntimeIdentifier=iossimulator-x64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: IosCleanerTest-arm64
          path: IosCleanerTest/bin/Debug/net9.0-ios/iossimulator-arm64/*.app/**

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: IosCleanerTest-x64
          path: IosCleanerTest/bin/Debug/net9.0-ios/iossimulator-x64/*.app/**
