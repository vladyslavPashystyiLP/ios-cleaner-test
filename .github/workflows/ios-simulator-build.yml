name: iOS Simulator build (Appetize)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build iOS simulator app (universal x64+arm64)
        # Universal binary: Appetize hosts on Apple Silicon run the native arm64 slice,
        # which CoreML/Vision require (they fail under Rosetta x64 emulation)
        # single quotes keep the inner double quotes so MSBuild sees the semicolon as part of the value
        run: dotnet build IosCleanerTest/IosCleanerTest.csproj -f net9.0-ios -c Debug '-p:RuntimeIdentifiers="iossimulator-x64;iossimulator-arm64"'

      - name: Show produced .app bundles
        run: find IosCleanerTest/bin/Debug/net9.0-ios -maxdepth 2 -name "*.app" -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IosCleanerTest-simulator
          # the wildcard makes net9.0-ios the artifact root, so the .app folder
          # is preserved at the zip root — uploadable to Appetize as-is
          path: IosCleanerTest/bin/Debug/net9.0-ios/*.app/**
